name: Airline CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build package
        run: |
          mkdir build
          cp server.js package.json package-lock.json build/
          echo "Build created from commit: ${{ github.sha }}" > build/build-info.txt
          echo "Build completed successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: airline-app-build
          path: build/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: airline-app-build
          path: staging-deployment/

      - name: Create staging deployment log
        run: |
          echo "STAGING DEPLOYMENT LOG" > staging-deployment/staging-log.txt
          echo "Environment: Staging / UAT" >> staging-deployment/staging-log.txt
          echo "Application: Airline CI/CD Demo" >> staging-deployment/staging-log.txt
          echo "Commit deployed: ${{ github.sha }}" >> staging-deployment/staging-log.txt
          echo "Deployment status: Successful" >> staging-deployment/staging-log.txt
          echo "Purpose: Validate application before production" >> staging-deployment/staging-log.txt
          cat staging-deployment/staging-log.txt

      - name: Upload staging deployment record
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-record
          path: staging-deployment/

  deploy-production:
    name: Deploy to IIS Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: airline-app-build
          path: production-deployment/

      - name: Create IIS production deployment log
        run: |
          echo "IIS PRODUCTION DEPLOYMENT LOG" > production-deployment/iis-production-log.txt
          echo "Environment: Microsoft IIS Production" >> production-deployment/iis-production-log.txt
          echo "Application Pool: AirlineAppPool" >> production-deployment/iis-production-log.txt
          echo "IIS Path: C:\inetpub\wwwroot\AirlineApp" >> production-deployment/iis-production-log.txt
          echo "Commit deployed: ${{ github.sha }}" >> production-deployment/iis-production-log.txt
          echo "Step 1: Connected to IIS server - Simulated" >> production-deployment/iis-production-log.txt
          echo "Step 2: Stopped IIS Application Pool - Simulated" >> production-deployment/iis-production-log.txt
          echo "Step 3: Copied application files - Simulated" >> production-deployment/iis-production-log.txt
          echo "Step 4: Started IIS Application Pool - Simulated" >> production-deployment/iis-production-log.txt
          echo "Deployment status: Successful" >> production-deployment/iis-production-log.txt
          cat production-deployment/iis-production-log.txt

      - name: Upload IIS production deployment record
        uses: actions/upload-artifact@v4
        with:
          name: iis-production-deployment-record
          path: production-deployment/