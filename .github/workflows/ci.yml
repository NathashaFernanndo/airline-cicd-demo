name: Airline CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build app
        run: |
          mkdir build
          cp server.js package.json package-lock.json build/
          echo "Build completed successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: airline-app-build
          path: build/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: airline-app-build
          path: staging/

      - name: Simulate staging deployment
        run: |
          echo "Deploying application to STAGING environment..."
          echo "Version deployed to staging: ${{ github.sha }}" > staging/deployed-version.txt
          cat staging/deployed-version.txt

  deploy-production:
    name: Deploy to IIS Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: airline-app-build
          path: production/

      - name: Simulate Microsoft IIS deployment
        run: |
          echo "Connecting to Microsoft IIS Server..."
          echo "Stopping IIS Application Pool: AirlineAppPool"
          echo "Copying build files to C:\inetpub\wwwroot\AirlineApp"
          echo "Starting IIS Application Pool: AirlineAppPool"
          echo "Deployment to IIS Production completed successfully."
          echo "Version deployed to IIS Production: ${{ github.sha }}" > production/iis-deployment-log.txt
          cat production/iis-deployment-log.txt


